name: Bug Report
description: 버그를 제보합니다
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 제보 감사합니다. 아래 항목을 최대한 상세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했나요?
      placeholder: 명확하고 간결하게 설명해주세요
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 단계를 알려주세요
      placeholder: |
        1. '...' 명령어 실행
        2. '...' 설정 적용
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떤 결과를 기대했나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떤 결과가 나왔나요?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: 실행 환경을 알려주세요
      placeholder: |
        - OS: macOS 15.x
        - Python: 3.12.x
        - Symphony-CC: v0.1.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: 관련 로그나 에러 메시지가 있다면 붙여넣어주세요
      render: shell
    validations:
      required: false
